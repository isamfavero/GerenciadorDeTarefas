<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Gerenciador de Tarefas</h1>

      <!-- botão para conectar com a conta Google (precisa ser clicado antes de usar o Calendar) -->
      <div class="google-row">
        <button type="button" id="google-connect-btn" class="btn-dark btn-google">
          Conectar ao Google Agenda
        </button>
        <p id="google-status" class="google-status">Status: Desconectado</p>
      </div>
    </header>

    <main class="app-main">
      <!-- formulário de cadastro de tarefa -->
      <section class="task-form-section" aria-label="Nova tarefa">
        <form id="task-form" class="task-form">
          <div class="field">
            <label for="title">Título</label>
            <input type="text" id="title" name="title" placeholder="Ex: Revisar relatório" required />
          </div>

          <div class="field">
            <label for="description">Descrição (Opcional)</label>
            <input type="text" id="description" name="description" placeholder="Detalhes da tarefa" />
          </div>

          <div class="field-row bottom-row">
            <div class="field date-field">
              <label for="due-date">Prazo de Conclusão (Opcional)</label>
              <input type="date" id="due-date" name="dueDate" />
            </div>

            <button type="submit" class="btn-dark btn-primary">Cadastrar Nova Tarefa</button>
          </div>
        </form>
      </section>

      <!-- lista de tarefas -->
      <section class="task-list-section" aria-label="Lista de tarefas">
        <h2>Tarefas</h2>

        <div class="search-bar">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>

          <label for="search-input" class="sr-only">Pesquisar tarefas</label>
          <input
            type="search"
            id="search-input"
            placeholder="Pesquisar por título ou descrição..."
            autocomplete="off"
          />
        </div>

        <div class="toolbar-row">
          <button type="button" id="ai-priority-btn" class="btn-outline btn-ai">
            Sugerir Prioridades com IA
          </button>

          <div class="filter-group">
            <span class="filter-label">Filtrar:</span>
            <div class="filters" role="group" aria-label="Filtrar por status">
              <button type="button" class="filter-btn active" data-filter="todas">Todas</button>
              <button type="button" class="filter-btn" data-filter="pendente">Pendentes</button>
              <button type="button" class="filter-btn" data-filter="concluida">Concluídas</button>
            </div>
          </div>
        </div>

        <p id="ai-priority-status" class="ai-priority-status"></p>

        <ul id="task-list" class="task-list">
          <!-- tarefas inseridas via javaScript -->
        </ul>

        <p id="empty-state" class="empty-state">Nenhuma tarefa cadastrada ainda.</p>
      </section>
    </main>
  </div>

  <!-- template de uma tarefa (usado pelo JS) -->
  <template id="task-item-template">
    <li class="task-item" data-id="">
      <input type="checkbox" class="task-status-checkbox" />
      <div class="task-item-content">
        <!-- modo visualização -->
        <div class="task-view">
          <h3 class="task-title"></h3>
          <p class="task-description"></p>
          <div class="task-meta">
            <span class="task-due-date"></span>
            <span class="task-priority-badge"></span>
          </div>
        </div>

        <!-- modo edição (fica escondido até clicar em "Editar") -->
        <div class="task-edit hidden">
          <div class="field">
            <label>Título</label>
            <input type="text" class="edit-title" />
          </div>

          <div class="field">
            <label>Descrição</label>
            <input type="text" class="edit-description" />
          </div>
          <div class="field">
            <label>Prazo máximo</label>
            <input type="date" class="edit-due-date" />
          </div>
        </div>
      </div>

      <div class="task-item-actions">
        <button type="button" class="btn-outline btn-google-add">Adicionar ao Google Agenda</button>
        <div class="actions-row">
          <button type="button" class="btn-outline btn-edit">Editar</button>
          <button type="button" class="btn-outline btn-delete" aria-label="Excluir tarefa">Excluir</button>
          <button type="button" class="btn-dark btn-save hidden">Salvar</button>
          <button type="button" class="btn-outline btn-cancel hidden">Cancelar</button>
        </div>
      </div>
    </li>
  </template>

  <!-- biblioteca do google para chamar a API do google agenda -->
  <script src="https://apis.google.com/js/api.js"></script>

  <!-- biblioteca do Google para fazer o login (OAuth) -->
  <script src="https://accounts.google.com/gsi/client"></script>

  <!-- configuração com as chaves do Google (API key e Client ID) -->
  <script src="js/config.js"></script>

  <!-- código que fala com a API do Google Calendar -->
  <script src="js/google-calendar.js"></script>

  <!-- código principal do app (CRUD de tarefas) -->
  <script src="js/script.js"></script>
</body>
</html>
